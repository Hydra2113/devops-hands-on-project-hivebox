apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivebox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hivebox
  template:
    metadata:
      labels:
        app: hivebox
      annotations:
        # No AppArmor annotation: Docker Desktop's kernel has no AppArmor, and
        # kubelet rejects pods requesting profiles it cannot enforce
        # (AC_K8S_0073 skipped in CI). Re-add on AppArmor-capable nodes.
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      # HiveBox never calls the Kubernetes API, so don't mount a token a
      # compromised pod could use against the cluster.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Image is side-loaded locally via `kind load`, so it has no registry
        # digest and a fixed :latest tag by design (see skip_rules in CI).
        - name: hivebox
          image: hivebox:v0.0.1
          # Never pull: the image is side-loaded with `kind load docker-image`,
          # it does not exist in any registry.
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          # Readiness gates traffic on actual serving ability (upstream or
          # cache); liveness stays on /version — restarting a pod cannot fix
          # openSenseMap being down, so upstream health must not restart us.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            # /readyz fetches upstream with 2s timeouts when its 30s memo is
            # cold; the kubelet default probe timeout of 1s would flag those
            # probes as failures.
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /version
              port: 3000
          # requests = what the scheduler reserves; limits = the hard ceiling.
          # Small values for a lightweight Node app; tune from real usage.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
