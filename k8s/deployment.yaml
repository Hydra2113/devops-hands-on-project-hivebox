apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivebox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hivebox
  template:
    metadata:
      labels:
        app: hivebox
    spec:
      # HiveBox never calls the Kubernetes API, so don't mount a token a
      # compromised pod could use against the cluster.
      automountServiceAccountToken: false
      containers:
        - name: hivebox
          image: hivebox:latest
          # Never pull: the image is side-loaded with `kind load docker-image`,
          # it does not exist in any registry.
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /version
              port: 3000
