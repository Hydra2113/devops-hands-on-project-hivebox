# Default values target the local KIND setup; override per environment
# (e.g. --set image.repository=ghcr.io/hydra2113/devops-hands-on-project-hivebox).

replicaCount: 2

image:
  repository: hivebox
  # Empty tag defaults to the chart's appVersion — a specific version,
  # never "latest", so what runs is always identifiable.
  tag: ""
  # Never: image is side-loaded with `kind load docker-image`.
  # Use IfNotPresent when pulling from a registry.
  pullPolicy: Never

service:
  port: 3000

ingress:
  enabled: true
  className: nginx

# Connection settings for the in-cluster infrastructure (see kustomize/).
# Clear-text protocols (redis://, http://): acceptable for pod-to-pod traffic
# inside a local single-node cluster only. Real deployments should use
# rediss:// and https:// (or mesh mTLS) — see docs/kubernetes-security-review.md.
env:
  valkeyUrl: redis://valkey:6379 # NOSONAR — local-only clear-text, reviewed: security review gap 7
  s3Endpoint: http://minio:9000 # NOSONAR — local-only clear-text, reviewed: security review gap 7
  s3Bucket: hivebox
  # Secret holding access-key / secret-key; created by the kustomize overlay.
  s3CredentialsSecret: minio-credentials

resources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: 250m
    memory: 128Mi
