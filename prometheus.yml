global:
  scrape_interval: 15s

scrape_configs:
  - job_name: hivebox
    # /metrics is the default path, so it's not repeated here.
    static_configs:
      # host.docker.internal = the host machine, as seen from inside the
      # Prometheus container. Use 'localhost:3000' instead if you run the
      # prometheus binary natively on the host.
      - targets: ['host.docker.internal:80']
