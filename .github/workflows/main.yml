name: main-worflow

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: create runtime environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: clean install
        run: npm ci

      - name: lint javascript
        run: npm run lint

      - name: lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile

      - name: run unit tests
        run: npm test

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: scan code for security issues
        run: semgrep scan --config auto --error

  terrascan:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The terrascan-action is stale (2022): its old OPA engine can't compile
      # the current policy set it downloads at runtime. Run the pinned
      # terrascan image directly instead — same command verified locally.
      # Skipped rules are inapplicable to a local KIND deploy: image has no
      # registry digest and a fixed :latest tag (side-loaded); ingress has
      # no TLS cert.
      - name: scan kubernetes manifests
        run: >
          docker run --rm -v "$PWD/k8s:/iac" tenable/terrascan:1.19.9
          scan -i k8s -d /iac
          --skip-rules="AC_K8S_0069,AC_K8S_0068,AC_K8S_0002"
      

        
