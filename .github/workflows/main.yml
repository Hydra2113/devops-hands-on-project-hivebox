name: main-worflow

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: create runtime environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: clean install
        run: npm ci

      - name: lint javascript
        run: npm run lint

      - name: lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile

      # The integration tests need a live Valkey and MinIO; reuse the same
      # docker-compose.yml developers run locally, then wait until both
      # actually answer before testing against them.
      - name: start Valkey and MinIO
        run: |
          docker compose up -d
          timeout 30 sh -c 'until curl -sf http://localhost:9000/minio/health/live > /dev/null; do sleep 1; done'
          timeout 30 sh -c 'until [ "$(docker compose exec -T valkey valkey-cli PING)" = "PONG" ]; do sleep 1; done'

      - name: run unit and integration tests
        run: npm test

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: scan code for security issues
        run: semgrep scan --config auto --error

  terrascan:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The terrascan-action is stale (2022): its old OPA engine can't compile
      # the current policy set it downloads at runtime. Run the pinned
      # terrascan image directly instead — same command verified locally.
      # Scan what actually gets applied: the rendered helm chart and
      # kustomize overlay, alongside the plain manifests.
      - name: render helm chart and kustomize overlay
        run: |
          mkdir -p rendered
          cp k8s/*.yaml rendered/
          helm template hivebox helm/hivebox > rendered/helm-app.yaml
          kubectl kustomize kustomize/overlays/local > rendered/infra.yaml

      # Skipped rules are inapplicable to a local KIND deploy: image has no
      # registry digest (side-loaded); ingress has no TLS cert; the node
      # kernel has no AppArmor, and kubelet rejects pods requesting profiles
      # it cannot enforce. AC_K8S_0051 (secrets as files, not env) is an
      # accepted trade-off: the app is 12-factor and reads env vars — see
      # docs/kubernetes-security-review.md.
      - name: scan kubernetes manifests
        run: >
          docker run --rm -v "$PWD/rendered:/iac" tenable/terrascan:1.19.9
          scan -i k8s -d /iac
          --skip-rules="AC_K8S_0069,AC_K8S_0002,AC_K8S_0073,AC_K8S_0051"
      

        
