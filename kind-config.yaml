kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Label the node so the ingress-nginx (kind flavor) controller,
    # which schedules only onto ingress-ready nodes, can land here.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Forward host ports 80/443 into this node so http://localhost/
    # on your machine reaches the ingress controller inside the cluster.
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
